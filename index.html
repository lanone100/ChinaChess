<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>中國象棋 · Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #f0f3f8; --bg-end: #e2e8f0;
            --panel-bg: rgba(255, 255, 255, 0.75);
            --panel-blur: 20px;
            --panel-border: 1px solid rgba(255, 255, 255, 0.5);
            --panel-shadow: 0 10px 30px rgba(0,0,0,0.1);
            --text-primary: #1e293b; --text-secondary: #475569;
            --accent: #4f6f8f; --red-turn: #b23b3b; --black-turn: #1e293b;
            --board-card-bg: rgba(210, 225, 240, 0.3);
            --canvas-border: #9aaec2;
        }

        body.dark {
            --bg-start: #121a24; --bg-end: #0b1219;
            --panel-bg: rgba(25, 35, 45, 0.85);
            --panel-border: 1px solid rgba(255, 255, 255, 0.1);
            --text-primary: #e9edf2; --text-secondary: #a0b8cc;
            --accent: #7aa5c7; --red-turn: #f28b82; --black-turn: #e9edf2;
            --board-card-bg: rgba(25, 40, 55, 0.4);
            --canvas-border: #4f6579;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            height: 100vh; height: 100dvh; overflow: hidden; 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            display: flex; align-items: center; justify-content: center;
            color: var(--text-primary); transition: background 0.3s;
        }

        .game-container {
            width: 100%; height: 100%; max-width: 1100px;
            display: flex; flex-direction: column; padding: 12px; gap: 12px;
        }

        @media (min-width: 768px) {
            .game-container { flex-direction: row; padding: 24px; align-items: stretch; }
            .side-panel { order: 2; width: 280px; flex-shrink: 0; }
            .board-card { order: 1; flex: 1; }
        }

        /* 棋盤區域 */
        .board-card {
            background: var(--board-card-bg);
            backdrop-filter: blur(var(--panel-blur));
            border-radius: 32px; border: var(--panel-border);
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--panel-shadow); overflow: hidden;
        }

        canvas { 
            max-width: 100%; max-height: 100%; cursor: pointer;
            transition: opacity 0.3s; 
        }
        canvas.thinking { cursor: wait; opacity: 0.7; }

        /* 控制面板 */
        .side-panel { display: flex; flex-direction: column; gap: 12px; }
        .toolbar {
            background: var(--panel-bg); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 24px; border: var(--panel-border);
            display: flex; flex-direction: column; gap: 10px; box-shadow: var(--panel-shadow);
        }

        .turn-indicator {
            padding: 10px; border-radius: 12px; text-align: center;
            font-weight: 700; font-size: 1.1rem; background: rgba(255,255,255,0.2);
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            padding: 12px; border: none; border-radius: 16px; 
            background: var(--panel-bg); color: var(--text-primary);
            font-weight: 600; cursor: pointer; transition: all 0.2s;
            border: var(--panel-border); box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        button:active { transform: scale(0.95); }
        .btn-primary { background: var(--accent); color: white; }

        /* 被吃掉的棋子 */
        .grave-yard {
            background: var(--panel-bg); padding: 12px; border-radius: 24px;
            border: var(--panel-border); display: flex; flex-direction: column; gap: 8px;
        }
        .grave-side { font-size: 1.2rem; display: flex; flex-wrap: wrap; gap: 4px; }

        /* 初始遮罩 */
        .overlay {
            position: fixed; inset: 0; background: var(--panel-bg);
            backdrop-filter: blur(30px); z-index: 100;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.4s;
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }
        .modal {
            background: white; padding: 30px; border-radius: 32px;
            width: 90%; max-width: 350px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .dark .modal { background: #1e293b; }
    </style>
</head>
<body>

<div class="overlay" id="modeOverlay">
    <div class="modal">
        <h2 style="margin-bottom: 20px;">中國象棋</h2>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="btn-primary" onclick="startGame('pvp')">👥 雙人對弈</button>
            <button onclick="startGame('ai')">🤖 人機對戰</button>
        </div>
    </div>
</div>

<div class="game-container">
    <div class="board-card" id="boardCard">
        <canvas id="chessCanvas"></canvas>
    </div>

    <div class="side-panel">
        <div class="toolbar">
            <div class="turn-indicator" id="turnDisplay">🔴 紅方走棋</div>
            <div class="btn-group">
                <button id="undoBtn" disabled>↩ 悔棋</button>
                <button id="restartBtn">↻ 重開</button>
            </div>
            <button id="themeBtn" style="width: 100%;">🌙 切換主題</button>
        </div>
        
        <div class="grave-yard">
            <div id="graveBlack" style="color:var(--black-turn)">⚫ <span id="blackCap"></span></div>
            <div id="graveRed" style="color:var(--red-turn)">🔴 <span id="redCap"></span></div>
        </div>

        <div id="winnerMsg" style="display:none; padding:15px; border-radius:15px; background:var(--accent); color:white; text-align:center; font-weight:bold;"></div>
    </div>
</div>

<script>
(function(){
    'use strict';
    const canvas = document.getElementById('chessCanvas'), ctx = canvas.getContext('2d');
    const turnDisp = document.getElementById('turnDisplay'), winnerEl = document.getElementById('winnerMsg');
    const undoB = document.getElementById('undoBtn'), modeOv = document.getElementById('modeOverlay');
    
    let board = [], turn = 'w', selR = -1, selC = -1, over = false, hist = [], gMode = 'pvp';
    let captured = { w: [], b: [] }; // w: 被紅方吃的(黑子), b: 被黑方吃的(紅子)
    let CELL, OX, OY, PR;

    const CH = { R:'車', H:'馬', E:'相', A:'士', K:'帥', C:'砲', P:'兵', r:'車', h:'馬', e:'象', a:'士', k:'將', c:'砲', p:'卒' };
    const pcol = p => (!p || p === ' ') ? null : (p >= 'A' && p <= 'Z' ? 'w' : 'b');

    function resize() {
        const rect = document.getElementById('boardCard').getBoundingClientRect();
        const size = Math.min(rect.width, rect.height) - 40;
        CELL = Math.floor(size / 9.5);
        canvas.width = CELL * 8.5 + 40; canvas.height = CELL * 9.5 + 40;
        OX = 20 + CELL * 0.25; OY = 20 + CELL * 0.25;
        PR = CELL * 0.42;
        drawBoard();
    }
    window.addEventListener('resize', resize);
    new ResizeObserver(resize).observe(document.getElementById('boardCard'));

    function initGame() {
        board = [
            ['r','h','e','a','k','a','e','h','r'],
            [' ',' ',' ',' ',' ',' ',' ',' ',' '],
            [' ','c',' ',' ',' ',' ',' ','c',' '],
            ['p',' ','p',' ','p',' ','p',' ','p'],
            [' ',' ',' ',' ',' ',' ',' ',' ',' '],
            [' ',' ',' ',' ',' ',' ',' ',' ',' '],
            ['P',' ','P',' ','P',' ','P',' ','P'],
            [' ','C',' ',' ',' ',' ',' ','C',' '],
            [' ',' ',' ',' ',' ',' ',' ',' ',' '],
            ['R','H','E','A','K','A','E','H','R']
        ];
        turn = 'w'; over = false; hist = []; captured = { w: [], b: [] };
        winnerEl.style.display = 'none'; undoB.disabled = true;
        updateUI(); resize();
    }

    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--canvas-border');
        ctx.lineWidth = 1.5;

        // 格線
        for(let i=0; i<10; i++){
            ctx.beginPath(); ctx.moveTo(OX, OY + i*CELL); ctx.lineTo(OX + 8*CELL, OY + i*CELL); ctx.stroke();
        }
        for(let i=0; i<9; i++){
            ctx.beginPath(); ctx.moveTo(OX + i*CELL, OY); 
            if(i===0 || i===8) ctx.lineTo(OX + i*CELL, OY + 9*CELL);
            else { ctx.lineTo(OX + i*CELL, OY + 4*CELL); ctx.moveTo(OX + i*CELL, OY + 5*CELL); ctx.lineTo(OX + i*CELL, OY + 9*CELL); }
            ctx.stroke();
        }
        // 九宮格
        const drewX = (r, c) => {
            ctx.beginPath(); ctx.moveTo(OX+3*CELL, OY+r*CELL); ctx.lineTo(OX+5*CELL, OY+c*CELL); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(OX+5*CELL, OY+r*CELL); ctx.lineTo(OX+3*CELL, OY+c*CELL); ctx.stroke();
        }
        drewX(0, 2); drewX(7, 9);

        // 棋子
        for(let r=0; r<10; r++) for(let c=0; c<9; c++){
            if(board[r][c] !== ' ') drawPiece(r, c, board[r][c]);
        }
        // 選取框
        if(selR !== -1) {
            ctx.strokeStyle = '#4f6f8f'; ctx.lineWidth = 3;
            ctx.strokeRect(OX+selC*CELL-PR, OY+selR*CELL-PR, PR*2, PR*2);
        }
    }

    function drawPiece(r, c, p) {
        const isRed = pcol(p) === 'w';
        ctx.save();
        ctx.translate(OX + c*CELL, OY + r*CELL);
        // 陰影與圓盤
        ctx.shadowBlur = 4; ctx.shadowColor = "rgba(0,0,0,0.2)";
        ctx.beginPath(); ctx.arc(0, 0, PR, 0, Math.PI*2);
        ctx.fillStyle = "#fff"; ctx.fill();
        ctx.strokeStyle = isRed ? "#b23b3b" : "#1e293b";
        ctx.lineWidth = 2; ctx.stroke();
        // 文字
        ctx.shadowBlur = 0; ctx.fillStyle = isRed ? "#b23b3b" : "#1e293b";
        ctx.font = `bold ${PR*1.2}px Inter`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(CH[p], 0, 2);
        ctx.restore();
    }

    canvas.addEventListener('click', e => {
        if(over) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        const c = Math.round((x - OX) / CELL), r = Math.round((y - OY) / CELL);
        if(r < 0 || r > 9 || c < 0 || c > 8) return;

        const p = board[r][c];
        if(pcol(p) === turn) {
            selR = r; selC = c;
        } else if(selR !== -1) {
            // 這裡簡化邏輯，假設移動合法（正式版應加入 CheckMove 邏輯）
            executeMove(selR, selC, r, c);
        }
        drawBoard();
    });

    function executeMove(fr, fc, tr, tc) {
        hist.push({ b: board.map(row => [...row]), t: turn, c: {w:[...captured.w], b:[...captured.b]} });
        const target = board[tr][tc];
        if(target !== ' ') {
            if(pcol(target) === 'w') captured.b.push(target);
            else captured.w.push(target);
        }
        board[tr][tc] = board[fr][fc];
        board[fr][fc] = ' ';
        selR = -1; selC = -1;
        
        // 檢查將軍/勝負
        const all = board.flat();
        if(!all.includes('K')) endGame('黑方勝利');
        else if(!all.includes('k')) endGame('紅方勝利');
        else {
            turn = (turn === 'w' ? 'b' : 'w');
            updateUI();
        }
    }

    function updateUI() {
        turnDisp.textContent = turn === 'w' ? '🔴 紅方走棋' : '⚫ 黑方走棋';
        turnDisp.style.color = turn === 'w' ? 'var(--red-turn)' : 'var(--black-turn)';
        document.getElementById('redCap').textContent = captured.w.map(p => CH[p]).join(' ');
        document.getElementById('blackCap').textContent = captured.b.map(p => CH[p]).join(' ');
        undoB.disabled = hist.length === 0;
    }

    function endGame(msg) {
        over = true; winnerEl.textContent = msg; winnerEl.style.display = 'block';
    }

    window.startGame = (mode) => {
        gMode = mode;
        modeOv.classList.add('hidden');
        initGame();
    };

    document.getElementById('restartBtn').onclick = () => modeOv.classList.remove('hidden');
    document.getElementById('themeBtn').onclick = () => document.body.classList.toggle('dark');
    document.getElementById('undoBtn').onclick = () => {
        if(hist.length === 0) return;
        const last = hist.pop();
        board = last.b; turn = last.t; captured = last.c;
        over = false; winnerEl.style.display = 'none';
        updateUI(); drawBoard();
    };

    initGame();
})();
</script>
</body>
</html>
