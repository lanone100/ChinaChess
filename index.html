<script>
(function () {
    // ─── Canvas & State ─────────────────────────────────────────────────────
    const canvas = document.getElementById('chessCanvas');
    const ctx    = canvas.getContext('2d');
    const turnDisplay  = document.getElementById('turnDisplay');
    const winnerDiv    = document.getElementById('winnerMessage');
    const restartBtn   = document.getElementById('restartBtn');
    const themeBtn     = document.getElementById('themeToggleBtn');
    const undoBtn      = document.getElementById('undoBtn');

    const COLS = 9, ROWS = 10;
    const CELL = 54;
    // Canvas is 540×600; grid starts at offsetX/Y
    const OX = (540 - CELL * 8) / 2;   // = 27
    const OY = (600 - CELL * 9) / 2;   // = 57

    let board = [];
    let currentTurn = 'w';   // 'w'=紅方(大寫), 'b'=黑方(小寫)
    let selectedRow = -1, selectedCol = -1;
    let gameOver = false;
    let history = [];   // 悔棋用 [{board, turn, selR, selC}]
    let legalMoves = []; // 選中棋子的合法目標格 [{r,c}]

    // ─── 棋盤字母對應 ───────────────────────────────────────────────────────
    const pieceChar = {
        R:'車', H:'馬', E:'相', A:'士', K:'帥', C:'砲', P:'兵',
        r:'車', h:'馬', e:'象', a:'士', k:'將', c:'砲', p:'卒'
    };

    function getPieceColor(p) {
        if (!p || p === ' ') return null;
        return (p >= 'A' && p <= 'Z') ? 'w' : 'b';
    }

    function cloneBoard(b) {
        return b.map(row => [...row]);
    }

    // ─── 初始化棋盤 ─────────────────────────────────────────────────────────
    function initBoard() {
        board = Array(ROWS).fill(null).map(() => Array(COLS).fill(' '));
        // 黑方 (小寫) 上方
        board[0] = ['r','h','e','a','k','a','e','h','r'];
        board[2][1] = 'c'; board[2][7] = 'c';
        [0,2,4,6,8].forEach(c => board[3][c] = 'p');
        // 紅方 (大寫) 下方
        board[9] = ['R','H','E','A','K','A','E','H','R'];
        board[7][1] = 'C'; board[7][7] = 'C';
        [0,2,4,6,8].forEach(c => board[6][c] = 'P');

        currentTurn = 'w';
        selectedRow = selectedCol = -1;
        gameOver = false;
        history = [];
        legalMoves = [];
        undoBtn.disabled = true;
        winnerDiv.style.display = 'none';
        updateTurnDisplay();
        drawBoard();
    }

    // ─── 棋子移動規則 ────────────────────────────────────────────────────────
    function inBoard(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }

    /** 計算兩點之間（不含端點）有幾個棋子（水平或垂直直線） */
    function piecesBetween(b, r1, c1, r2, c2) {
        let count = 0;
        if (r1 === r2) {
            const [min, max] = [Math.min(c1,c2)+1, Math.max(c1,c2)];
            for (let c = min; c < max; c++) if (b[r1][c] !== ' ') count++;
        } else if (c1 === c2) {
            const [min, max] = [Math.min(r1,r2)+1, Math.max(r1,r2)];
            for (let r = min; r < max; r++) if (b[r][c1] !== ' ') count++;
        }
        return count;
    }

    /** 不考慮將帥暴露的基礎移動合法性 */
    function basicMoveValid(b, fr, fc, tr, tc) {
        if (!inBoard(tr, tc)) return false;
        const piece = b[fr][fc];
        if (!piece || piece === ' ') return false;
        const color = getPieceColor(piece);
        const target = b[tr][tc];
        if (target !== ' ' && getPieceColor(target) === color) return false; // 同色不能吃

        const dr = tr - fr, dc = tc - fc;
        const adr = Math.abs(dr), adc = Math.abs(dc);
        const p = piece.toUpperCase();

        switch (p) {
            case 'R': // 車
                if (dr !== 0 && dc !== 0) return false;
                return piecesBetween(b, fr, fc, tr, tc) === 0;

            case 'H': { // 馬 (日字+絆馬腳)
                if (!((adr===2&&adc===1)||(adr===1&&adc===2))) return false;
                // 絆馬腳
                if (adr === 2) { // 直走2格，橫走1格
                    const legR = fr + Math.sign(dr);
                    if (b[legR][fc] !== ' ') return false;
                } else {
                    const legC = fc + Math.sign(dc);
                    if (b[fr][legC] !== ' ') return false;
                }
                return true;
            }

            case 'E': { // 相/象 (田字+塞象眼，不過河)
                if (adr !== 2 || adc !== 2) return false;
                // 不過河
                if (color === 'w' && tr < 5) return false;
                if (color === 'b' && tr > 4) return false;
                // 塞象眼
                const eyeR = fr + dr/2, eyeC = fc + dc/2;
                if (b[eyeR][eyeC] !== ' ') return false;
                return true;
            }

            case 'A': { // 士 (斜走一格，在九宮)
                if (adr !== 1 || adc !== 1) return false;
                if (color === 'w') return tr >= 7 && tr <= 9 && tc >= 3 && tc <= 5;
                else               return tr >= 0 && tr <= 2 && tc >= 3 && tc <= 5;
            }

            case 'K': { // 帥/將 (縱橫一格，在九宮)
                if ((adr===1&&adc===0)||(adr===0&&adc===1)) {
                    if (color === 'w') return tr >= 7 && tr <= 9 && tc >= 3 && tc <= 5;
                    else               return tr >= 0 && tr <= 2 && tc >= 3 && tc <= 5;
                }
                return false;
            }

            case 'C': { // 砲 (直線移動不吃子，隔一子才能吃)
                if (dr !== 0 && dc !== 0) return false;
                const mid = piecesBetween(b, fr, fc, tr, tc);
                if (target === ' ') return mid === 0;
                else               return mid === 1;
            }

            case 'P': { // 兵/卒
                if (color === 'w') { // 紅兵：向上(行減)
                    if (!( (dr===-1&&dc===0) || (fr<=4 && dr===0 && adc===1) )) return false;
                } else { // 黑卒：向下(行加)
                    if (!( (dr===1&&dc===0) || (fr>=5 && dr===0 && adc===1) )) return false;
                }
                return true;
            }
        }
        return false;
    }

    /** 對局面 b 中，顏色 ac 的將/帥是否被攻擊 */
    function isKingAttacked(b, ac) {
        let kr = -1, kc = -1;
        const king = ac === 'w' ? 'K' : 'k';
        outer: for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (b[r][c] === king) { kr = r; kc = c; break outer; }
            }
        }
        if (kr === -1) return true; // 將帥被吃 = 已輸
        const opp = ac === 'w' ? 'b' : 'w';
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (getPieceColor(b[r][c]) === opp) {
                    if (basicMoveValid(b, r, c, kr, kc)) return true;
                }
            }
        }
        return false;
    }

    /** 兩將是否面對面（中間無棋子） */
    function kingsFacing(b) {
        let wr = -1, wc = -1, br = -1, bc = -1;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (b[r][c] === 'K') { wr = r; wc = c; }
                if (b[r][c] === 'k') { br = r; bc = c; }
            }
        }
        if (wr < 0 || br < 0) return false;
        if (wc !== bc) return false;
        return piecesBetween(b, wr, wc, br, bc) === 0;
    }

    /** 完整合法移動：執行後不能讓自己將帥被攻擊 or 兩將面對面 */
    function isValidMove(fr, fc, tr, tc) {
        if (!basicMoveValid(board, fr, fc, tr, tc)) return false;
        const nb = cloneBoard(board);
        nb[tr][tc] = nb[fr][fc];
        nb[fr][fc] = ' ';
        const mover = getPieceColor(board[fr][fc]);
        if (isKingAttacked(nb, mover)) return false;
        if (kingsFacing(nb)) return false;
        return true;
    }

    /** 某顏色是否有任何合法走法 */
    function hasAnyLegalMove(color) {
        for (let fr = 0; fr < ROWS; fr++) {
            for (let fc = 0; fc < COLS; fc++) {
                if (getPieceColor(board[fr][fc]) !== color) continue;
                for (let tr = 0; tr < ROWS; tr++) {
                    for (let tc = 0; tc < COLS; tc++) {
                        if (isValidMove(fr, fc, tr, tc)) return true;
                    }
                }
            }
        }
        return false;
    }

    /** 取得某棋子所有合法目標格 */
    function getLegalMoves(fr, fc) {
        const moves = [];
        for (let tr = 0; tr < ROWS; tr++) {
            for (let tc = 0; tc < COLS; tc++) {
                if (isValidMove(fr, fc, tr, tc)) moves.push({r:tr, c:tc});
            }
        }
        return moves;
    }

    // ─── 繪製 ─────────────────────────────────────────────────────────────
    function drawBoard() {
        ctx.clearRect(0, 0, 540, 600);

        // 棋盤底色木紋漸層
        const bg = ctx.createLinearGradient(0, 0, 540, 600);
        bg.addColorStop(0, '#e8cfaa');
        bg.addColorStop(1, '#cfaa7c');
        ctx.fillStyle = bg;
        ctx.roundRect(0, 0, 540, 600, 40);
        ctx.fill();

        // 微紋理感（疊一層薄噪聲橢圓）
        for (let i = 0; i < 18; i++) {
            ctx.save();
            ctx.globalAlpha = 0.03;
            ctx.fillStyle = '#6b4423';
            ctx.beginPath();
            ctx.ellipse(30 + i*28, 80 + (i%5)*100, 60, 8, i*0.35, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }

        // ── 格線 ──
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.25)';
        ctx.shadowBlur = 3;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#8b6535';

        // 縱線（列：左右共 9 條，但中段（楚河漢界）行4-5之間要斷開）
        for (let c = 0; c < COLS; c++) {
            if (c === 0 || c === COLS-1) {
                // 邊線完整
                ctx.beginPath();
                ctx.moveTo(OX + c*CELL, OY);
                ctx.lineTo(OX + c*CELL, OY + (ROWS-1)*CELL);
                ctx.stroke();
            } else {
                // 中間縱線：上半(行0-4) 和下半(行5-9) 各自畫
                ctx.beginPath();
                ctx.moveTo(OX + c*CELL, OY);
                ctx.lineTo(OX + c*CELL, OY + 4*CELL);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(OX + c*CELL, OY + 5*CELL);
                ctx.lineTo(OX + c*CELL, OY + 9*CELL);
                ctx.stroke();
            }
        }
        // 橫線
        for (let r = 0; r < ROWS; r++) {
            ctx.beginPath();
            ctx.moveTo(OX, OY + r*CELL);
            ctx.lineTo(OX + 8*CELL, OY + r*CELL);
            ctx.stroke();
        }
        ctx.restore();

        // ── 九宮斜線 ──
        ctx.save();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#9a7044';
        ctx.shadowColor = '#4d3520';
        ctx.shadowBlur = 3;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        [[0,0,2],[0,2,0],[7,0,2],[7,2,0]].forEach(([baseR, dc1, dc2]) => {
            ctx.beginPath();
            ctx.moveTo(OX + (3+dc1)*CELL, OY + baseR*CELL);
            ctx.lineTo(OX + (3+dc2)*CELL, OY + (baseR+2)*CELL);
            ctx.stroke();
        });
        ctx.restore();

        // ── 楚河漢界文字 ──
        ctx.save();
        ctx.font = 'bold 26px "Noto Serif TC", "KaiTi", "華文楷體", serif';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#6b4220';
        ctx.shadowColor = 'rgba(255,235,180,0.6)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetX = -1;
        ctx.shadowOffsetY = -1;
        const midY = OY + 4.5*CELL;
        ctx.fillText('楚  河', OX + 20, midY - 14);
        ctx.fillText('漢  界', OX + 300, midY - 14);
        ctx.restore();

        // ── 合法走棋提示點 ──
        legalMoves.forEach(({r, c}) => {
            const x = OX + c*CELL, y = OY + r*CELL;
            const tx = board[r][c];
            ctx.save();
            if (tx !== ' ') {
                // 可吃的棋子：四角標記
                ctx.strokeStyle = 'rgba(240,180,30,0.9)';
                ctx.lineWidth = 3;
                const d = 10, L = 16;
                [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([sr,sc]) => {
                    ctx.beginPath();
                    ctx.moveTo(x + sc*d, y + sr*d);
                    ctx.lineTo(x + sc*(d+L), y + sr*d);
                    ctx.moveTo(x + sc*d, y + sr*d);
                    ctx.lineTo(x + sc*d, y + sr*(d+L));
                    ctx.stroke();
                });
            } else {
                // 空格：小圓點
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(240,200,40,0.65)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(200,150,0,0.7)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            ctx.restore();
        });

        // ── 選中高亮 ──
        if (selectedRow !== -1 && !gameOver) {
            const x = OX + selectedCol*CELL, y = OY + selectedRow*CELL;
            ctx.save();
            ctx.shadowColor = '#ffd966';
            ctx.shadowBlur = 20;
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 5;
            const r = 26;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.stroke();
            ctx.restore();
        }

        // ── 棋子 ──
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                const piece = board[row][col];
                if (!piece || piece === ' ') continue;
                const x = OX + col*CELL, y = OY + row*CELL;
                const color = getPieceColor(piece);
                drawPiece(x, y, piece, color);
            }
        }
    }

    function drawPiece(x, y, piece, color) {
        const R = 23;

        // 棋子陰影
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.55)';
        ctx.shadowBlur = 14;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 4;
        ctx.beginPath();
        ctx.arc(x, y, R, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.01)';
        ctx.fill();
        ctx.restore();

        // 棋子本體球面漸層
        const gBase = ctx.createRadialGradient(x-7, y-7, 4, x, y, R+4);
        if (color === 'w') {
            gBase.addColorStop(0,   '#fff8e8');
            gBase.addColorStop(0.5, '#f0d48a');
            gBase.addColorStop(1,   '#c49a40');
        } else {
            gBase.addColorStop(0,   '#f5f0e0');
            gBase.addColorStop(0.5, '#d4c890');
            gBase.addColorStop(1,   '#8a7830');
        }
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, R, 0, Math.PI*2);
        ctx.fillStyle = gBase;
        ctx.fill();
        ctx.restore();

        // 棋子邊環
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, R, 0, Math.PI*2);
        ctx.strokeStyle = color === 'w' ? '#9a6820' : '#5a5020';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.restore();

        // 內圈裝飾環
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, R-4, 0, Math.PI*2);
        ctx.strokeStyle = color === 'w' ? 'rgba(140,80,20,0.4)' : 'rgba(60,50,10,0.35)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();

        // 高光球面反光
        const gHi = ctx.createRadialGradient(x-7, y-7, 1, x-5, y-5, 12);
        gHi.addColorStop(0, 'rgba(255,255,255,0.7)');
        gHi.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, R, 0, Math.PI*2);
        ctx.fillStyle = gHi;
        ctx.fill();
        ctx.restore();

        // 棋子文字
        const char = pieceChar[piece];
        ctx.save();
        ctx.font = `bold 28px "Noto Serif TC", "KaiTi", "華文楷體", serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // 文字浮雕：先淺後深
        ctx.fillStyle = color === 'w' ? 'rgba(255,220,180,0.6)' : 'rgba(200,200,150,0.5)';
        ctx.fillText(char, x-1, y-1);
        ctx.fillStyle = color === 'w' ? '#8b1a1a' : '#1a1a0a';
        ctx.shadowColor = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        ctx.fillText(char, x, y+1);
        ctx.restore();
    }

    // ─── 更新回合顯示 ─────────────────────────────────────────────────────
    function updateTurnDisplay() {
        turnDisplay.textContent = currentTurn === 'w' ? '🔴 紅方走棋' : '⚫ 黑方走棋';
    }

    // ─── 點擊事件 ─────────────────────────────────────────────────────────
    function getBoardPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width  / rect.width;
        const scaleY = canvas.height / rect.height;
        const cx = (e.clientX - rect.left) * scaleX;
        const cy = (e.clientY - rect.top)  * scaleY;
        // 最近交叉點
        const c = Math.round((cx - OX) / CELL);
        const r = Math.round((cy - OY) / CELL);
        return { r, c };
    }

    canvas.addEventListener('click', function (e) {
        if (gameOver) return;
        const { r, c } = getBoardPos(e);
        if (!inBoard(r, c)) return;

        const clicked = board[r][c];
        const clickedColor = getPieceColor(clicked);

        if (selectedRow === -1) {
            // 選棋
            if (clickedColor === currentTurn) {
                selectedRow = r; selectedCol = c;
                legalMoves = getLegalMoves(r, c);
                drawBoard();
            }
        } else {
            // 已有選中
            if (clickedColor === currentTurn) {
                // 換選同色棋子
                selectedRow = r; selectedCol = c;
                legalMoves = getLegalMoves(r, c);
                drawBoard();
            } else {
                // 嘗試移動
                if (isValidMove(selectedRow, selectedCol, r, c)) {
                    // 儲存悔棋快照
                    history.push({
                        board: cloneBoard(board),
                        turn: currentTurn,
                        selR: selectedRow,
                        selC: selectedCol
                    });
                    undoBtn.disabled = false;

                    const eaten = board[r][c];
                    board[r][c] = board[selectedRow][selectedCol];
                    board[selectedRow][selectedCol] = ' ';
                    selectedRow = selectedCol = -1;
                    legalMoves = [];

                    // 判斷勝負
                    if (eaten === 'k' || eaten === 'K') {
                        gameOver = true;
                        const winner = currentTurn === 'w' ? '🔴 紅方勝利！' : '⚫ 黑方勝利！';
                        winnerDiv.textContent = winner;
                        winnerDiv.style.display = 'block';
                        drawBoard();
                        return;
                    }

                    // 換邊
                    currentTurn = currentTurn === 'w' ? 'b' : 'w';
                    updateTurnDisplay();

                    // 檢查對方是否無棋可走
                    if (!hasAnyLegalMove(currentTurn)) {
                        gameOver = true;
                        const winner = currentTurn === 'w' ? '⚫ 黑方勝利！' : '🔴 紅方勝利！';
                        winnerDiv.textContent = winner;
                        winnerDiv.style.display = 'block';
                    }
                    drawBoard();
                } else {
                    // 點了不合法的格：取消選中
                    selectedRow = selectedCol = -1;
                    legalMoves = [];
                    drawBoard();
                }
            }
        }
    });

    // ─── 悔棋 ─────────────────────────────────────────────────────────────
    undoBtn.addEventListener('click', function () {
        if (history.length === 0) return;
        const snap = history.pop();
        board = snap.board;
        currentTurn = snap.turn;
        selectedRow = selectedCol = -1;
        legalMoves = [];
        gameOver = false;
        winnerDiv.style.display = 'none';
        undoBtn.disabled = history.length === 0;
        updateTurnDisplay();
        drawBoard();
    });

    // ─── 重新開始 ──────────────────────────────────────────────────────────
    restartBtn.addEventListener('click', initBoard);

    // ─── 深淺模式切換 ─────────────────────────────────────────────────────
    themeBtn.addEventListener('click', function () {
        document.body.classList.toggle('dark-mode');
        themeBtn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        drawBoard();
    });

    // ─── 啟動 ─────────────────────────────────────────────────────────────
    initBoard();
})();
</script>
